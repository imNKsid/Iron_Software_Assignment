<svg xmlns="http://www.w3.org/2000/svg" width="360" height="200" viewBox="0 0 360 200" role="img" aria-labelledby="flowTitle">
  <title id="flowTitle">HTML to C++ to PDF conversion flow</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9e9e9e"/>
    </marker>
  </defs>
  <!-- HTML -->
  <rect x="10" y="50" width="88" height="88" rx="12" fill="#ff9800"/>
  <text x="54" y="88" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="15" font-weight="700">5 HTML</text>
  <text x="54" y="108" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="11">&lt;/&gt;</text>
  <!-- arrow -->
  <line x1="110" y1="94" x2="148" y2="94" stroke="#9e9e9e" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- C++ gear -->
  <circle cx="200" cy="94" r="44" fill="#212121" stroke="#424242" stroke-width="2"/>
  <text x="200" y="102" text-anchor="middle" fill="#fff" font-family="Georgia,serif" font-size="22" font-weight="700">C++</text>
  <!-- arrow -->
  <line x1="252" y1="94" x2="290" y2="94" stroke="#9e9e9e" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- PDF -->
  <rect x="300" y="50" width="52" height="68" rx="6" fill="#c62828"/>
  <text x="326" y="92" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="14" font-weight="700">PDF</text>
</svg>
