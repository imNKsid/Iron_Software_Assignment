<svg xmlns="http://www.w3.org/2000/svg" width="520" height="400" viewBox="0 0 520 400" role="img" aria-labelledby="heroIllTitle">
  <title id="heroIllTitle">IronPDF for C++ beta artwork with document icon and abstract ribbons</title>
  <defs>
    <linearGradient id="ribbon1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26a69a"/>
      <stop offset="100%" stop-color="#00897b"/>
    </linearGradient>
    <linearGradient id="ribbon2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
    <linearGradient id="ribbon3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#8e0000"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>
  <!-- abstract ribbons -->
  <path d="M40 280 Q120 80 280 120 T480 40 L500 100 Q340 200 200 320 Z" fill="url(#ribbon1)" opacity="0.85"/>
  <path d="M80 360 Q200 140 380 200 L450 280 Q280 340 120 400 Z" fill="url(#ribbon2)" opacity="0.9"/>
  <path d="M0 120 Q180 40 320 180 L280 260 Q120 220 20 200 Z" fill="url(#ribbon3)" opacity="0.75"/>
  <!-- document -->
  <g transform="translate(200 100)">
    <rect x="0" y="0" width="140" height="180" rx="12" fill="url(#docGrad)" stroke="#0d47a1" stroke-width="2"/>
    <rect x="16" y="40" width="108" height="8" rx="2" fill="#e3f2fd" opacity="0.9"/>
    <rect x="16" y="58" width="88" height="8" rx="2" fill="#e3f2fd" opacity="0.7"/>
    <rect x="16" y="76" width="100" height="8" rx="2" fill="#e3f2fd" opacity="0.5"/>
    <text x="70" y="130" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">.CPP</text>
    <circle cx="70" cy="32" r="18" fill="#fff"/>
    <text x="70" y="38" text-anchor="middle" fill="#1565c0" font-family="Georgia,serif" font-size="14" font-weight="700">C++</text>
  </g>
</svg>
